# electron-builder 配置（设计文档 §9：PyInstaller 后端 exe + NSIS 安装包）
# 使用顺序：npm run dist:backend（先出 app/server/dist/ai-review-backend.exe）→ npm run dist
appId: com.ai-review.app
productName: AI 审校助手
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - out/**
  - package.json

# PyInstaller 单文件后端随 resources 分发；sidecar prod 模式 spawn resourcesPath/backend/ai-review-backend.exe
extraResources:
  - from: app/server/dist/ai-review-backend.exe
    to: backend/ai-review-backend.exe
  # 许可证验签公钥（客户端只含公钥）；主进程从 process.resourcesPath/license-public.pem 读取
  - from: app/desktop/resources/license-public.pem
    to: license-public.pem
  # 托盘图标（打包后托盘从 process.resourcesPath/icon.ico 读取，保证多尺寸清晰）
  - from: build/icon.ico
    to: icon.ico

# 模型文件不打包（数 GB）：首次启动后经 设置页 → 模型管理 从 hf-mirror 预下载（断点续传）
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI 审校助手
  # 自定义钩子：安装/卸载前静默 taskkill 强制结束托盘常驻的旧进程（build/installer.nsh）
  include: build/installer.nsh

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
